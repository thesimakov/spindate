# Сборка и деплой на свой сервер по SSH (после push в main)
name: Build and deploy to own server

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (for Node server, no static export)
        run: npm run build

      - name: Deploy to server via SSH
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_SSH_KEY_B64: ${{ secrets.SERVER_SSH_KEY_B64 }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -euo pipefail
          if { [ -z "${SERVER_SSH_KEY:-}" ] && [ -z "${SERVER_SSH_KEY_B64:-}" ]; } || [ -z "${SERVER_HOST:-}" ] || [ -z "${SERVER_USER:-}" ]; then
            echo "SERVER_SSH_KEY(_B64), SERVER_HOST or SERVER_USER not set — skipping deploy."
            echo "Add secrets in repo Settings → Secrets and variables → Actions."
            exit 0
          fi
          mkdir -p ~/.ssh
          # Ключ лучше хранить как base64 (одна строка), чтобы GitHub не ломал переносы.
          # SERVER_SSH_KEY_B64: base64 от приватного ключа (например ~/.ssh/deploy).
          if [ -n "${SERVER_SSH_KEY_B64:-}" ]; then
            echo "$SERVER_SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          else
            # Сырой ключ: убираем \r (Windows) — иначе "Load key: error in libcrypto"
            echo "$SERVER_SSH_KEY" | sed 's/\r$//' > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          if ! grep -q -- "BEGIN" ~/.ssh/deploy_key || ! grep -q -- "PRIVATE KEY" ~/.ssh/deploy_key; then
            echo "::error::SERVER_SSH_KEY не похож на приватный ключ. Вставь в Secrets полное содержимое deploy_key (cat deploy_key)."
            exit 1
          fi
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=12 -o TCPKeepAlive=yes"
          echo "Checking SSH connectivity..."
          ssh -o BatchMode=yes $SSH_OPTS "$SERVER_USER@$SERVER_HOST" "echo ok"
          echo "Creating directory on server..."
          ssh $SSH_OPTS "$SERVER_USER@$SERVER_HOST" "mkdir -p /var/www/spindate"
          echo "Syncing files..."
          # .next/cache — только для инкрементальной сборки, раздувает архив и даёт ошибки utime на части хостингов
          # --omit-dir-times / --no-times — если на каталоге нет прав менять mtime (Operation not permitted)
          rsync -avz --delete \
            --omit-dir-times \
            --no-times \
            --exclude 'node_modules' \
            --exclude 'data' \
            --exclude '.env*' \
            --exclude '.git' \
            --exclude '.next/cache' \
            -e "ssh $SSH_OPTS" \
            .next \
            public \
            package.json \
            package-lock.json \
            next.config.mjs \
            ecosystem.config.cjs \
            "$SERVER_USER@$SERVER_HOST:/var/www/spindate/"
          echo "Running npm ci and pm2 on server..."
          ssh $SSH_OPTS "$SERVER_USER@$SERVER_HOST" \
            "cd /var/www/spindate && npm ci && PORT=3001 pm2 start ecosystem.config.cjs --update-env && pm2 save"
          echo "Deploy finished."
