# Сборка и деплой на свой сервер по SSH (после push в main)
name: Build and deploy to own server

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (for Node server, no static export)
        run: npm run build

      - name: Deploy to server via SSH
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -e
          if [ -z "$SERVER_SSH_KEY" ] || [ -z "$SERVER_HOST" ] || [ -z "$SERVER_USER" ]; then
            echo "SERVER_SSH_KEY, SERVER_HOST or SERVER_USER not set — skipping deploy."
            echo "Add secrets in repo Settings → Secrets and variables → Actions."
            exit 0
          fi
          mkdir -p ~/.ssh
          # Сырой ключ: убираем \r (Windows) и пробелы в конце строк — иначе "Load key: error in libcrypto"
          echo "$SERVER_SSH_KEY" | sed 's/\r$//' | sed 's/[[:space:]]*$//' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if ! grep -q "BEGIN" ~/.ssh/deploy_key || ! grep -q "PRIVATE KEY" ~/.ssh/deploy_key; then
            echo "::error::SERVER_SSH_KEY не похож на приватный ключ. В GitHub → Settings → Secrets вставь ВЕСЬ вывод команды: cat deploy_key (от -----BEGIN до -----END включительно, со всеми строками)."
            exit 1
          fi
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "Creating directory on server..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SERVER_USER@$SERVER_HOST" "mkdir -p /var/www/spindate"
          echo "Syncing files..."
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            .next/ \
            public/ \
            package.json \
            package-lock.json \
            next.config.mjs \
            ecosystem.config.cjs \
            "$SERVER_USER@$SERVER_HOST:/var/www/spindate/"
          echo "Running npm ci and pm2 on server..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SERVER_USER@$SERVER_HOST" \
            "cd /var/www/spindate && npm ci && (pm2 restart spindate || pm2 start ecosystem.config.cjs) && pm2 save"
          echo "Deploy finished."
