# Сборка и деплой на свой сервер по SSH (после push в main).
# Zero-downtime: новый билд заливается в staging-папку, затем атомарный swap
# через симлинк и pm2 reload (graceful restart). Данные в Redis не теряются.
name: Build and deploy to own server

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-spindate-vps
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (for Node server, no static export)
        env:
          NEXT_PUBLIC_BUILD_ID: ${{ github.sha }}
          NEXT_PUBLIC_APP_URL: https://spindate.lemnity.ru
          NEXT_PUBLIC_VK_APP_ID: "54511363"
        run: npm run build

      - name: Remove .next/cache before deploy
        run: rm -rf .next/cache

      - name: Deploy to server via SSH (zero-downtime)
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_SSH_KEY_B64: ${{ secrets.SERVER_SSH_KEY_B64 }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_DEPLOY_PATH: ${{ secrets.SERVER_DEPLOY_PATH }}
        run: |
          set -euo pipefail

          # --- Paths ---
          BASE="${SERVER_DEPLOY_PATH:-/var/www/spindate}"
          # "current" symlink points at the active release; PM2 cwd = $BASE/current
          RELEASES="$BASE/releases"
          RELEASE_NAME="$(date +%Y%m%d_%H%M%S)_${GITHUB_SHA:0:7}"
          RELEASE_DIR="$RELEASES/$RELEASE_NAME"

          # --- SSH key ---
          if { [ -z "${SERVER_SSH_KEY:-}" ] && [ -z "${SERVER_SSH_KEY_B64:-}" ]; } || [ -z "${SERVER_HOST:-}" ] || [ -z "${SERVER_USER:-}" ]; then
            echo "::error::SERVER_SSH_KEY(_B64), SERVER_HOST или SERVER_USER не заданы."
            exit 1
          fi
          mkdir -p ~/.ssh
          if [ -n "${SERVER_SSH_KEY_B64:-}" ]; then
            echo "$SERVER_SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          else
            echo "$SERVER_SSH_KEY" | sed 's/\r$//' > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=15 -o ServerAliveCountMax=40 -o TCPKeepAlive=yes"
          SSH="ssh $SSH_OPTS $SERVER_USER@$SERVER_HOST"

          echo "Checking SSH connectivity..."
          $SSH "echo ok"

          echo "Creating release directory $RELEASE_DIR ..."
          $SSH "mkdir -p '$RELEASE_DIR' /tmp/rsync-spindate && chmod 1777 /tmp/rsync-spindate"

          echo "Syncing build artifacts..."
          rsync -rlpvz \
            -M '--temp-dir=/tmp/rsync-spindate' \
            --exclude '.DS_Store' \
            -e "ssh $SSH_OPTS" \
            .next \
            public \
            package.json \
            package-lock.json \
            next.config.mjs \
            ecosystem.config.cjs \
            "$SERVER_USER@$SERVER_HOST:$RELEASE_DIR/"

          echo "Installing deps, swapping symlink, reloading PM2..."
          $SSH bash -s -- "$BASE" "$RELEASE_DIR" "$RELEASES" <<'REMOTE_SCRIPT'
            set -euo pipefail
            BASE="$1"; RELEASE="$2"; RELEASES_DIR="$3"

            cd "$RELEASE"

            # Shared .env — symlink into release
            if [ -f "$BASE/shared/.env.local" ]; then
              ln -sf "$BASE/shared/.env.local" .env.local
            elif [ -f "$BASE/.env.local" ]; then
              ln -sf "$BASE/.env.local" .env.local
            fi

            # Shared data dir (SQLite, uploads)
            if [ -d "$BASE/shared/data" ]; then
              ln -sf "$BASE/shared/data" data
            elif [ -d "$BASE/data" ]; then
              ln -sf "$BASE/data" data
            fi

            npm ci --production

            # Atomic symlink swap: current → this release
            ln -sfn "$RELEASE" "$BASE/current.tmp"
            mv -fT "$BASE/current.tmp" "$BASE/current"

            # Graceful reload: PM2 keeps old process alive until new one is ready.
            # If PM2 process doesn't exist yet — start it.
            if pm2 describe spindate >/dev/null 2>&1; then
              pm2 reload spindate --update-env
            else
              cd "$BASE/current"
              PORT=3002 pm2 start ecosystem.config.cjs --update-env
            fi
            pm2 save

            # Cleanup: keep last 3 releases
            cd "$RELEASES_DIR"
            ls -1dt */ 2>/dev/null | tail -n +4 | xargs rm -rf -- 2>/dev/null || true

            echo "Deploy complete. Active release: $(readlink -f "$BASE/current")"
          REMOTE_SCRIPT
