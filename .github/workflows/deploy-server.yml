# Сборка и деплой на свой сервер по SSH (после push в main)
name: Build and deploy to own server

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (for Node server, no static export)
        env:
          # Видно в HTML (`data-build` на body) — сверка с коммитом на GitHub
          NEXT_PUBLIC_BUILD_ID: ${{ github.sha }}
          # Должен совпадать с доменом в проде — иначе OG/metadata и часть клиентских URL будут неверными.
          # Форк: поменяй здесь или задай репозиторную переменную NEXT_PUBLIC_APP_URL (и подставь через vars).
          NEXT_PUBLIC_APP_URL: https://spindate.lemnity.ru
          # Публичный ID мини-приложения VK — вшивается в клиентскую сборку (как в .env.example).
          NEXT_PUBLIC_VK_APP_ID: "54511363"
        run: npm run build

      # Кэш webpack/swc не нужен для `next start`, только раздувает rsync и провоцирует Broken pipe
      - name: Remove .next/cache before deploy
        run: rm -rf .next/cache

      - name: Deploy to server via SSH
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_SSH_KEY_B64: ${{ secrets.SERVER_SSH_KEY_B64 }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -euo pipefail
          if { [ -z "${SERVER_SSH_KEY:-}" ] && [ -z "${SERVER_SSH_KEY_B64:-}" ]; } || [ -z "${SERVER_HOST:-}" ] || [ -z "${SERVER_USER:-}" ]; then
            echo "::error::SERVER_SSH_KEY(_B64), SERVER_HOST или SERVER_USER не заданы — deploy прерван."
            echo "Add secrets in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          mkdir -p ~/.ssh
          # Ключ лучше хранить как base64 (одна строка), чтобы GitHub не ломал переносы.
          # SERVER_SSH_KEY_B64: base64 от приватного ключа (например ~/.ssh/deploy).
          if [ -n "${SERVER_SSH_KEY_B64:-}" ]; then
            echo "$SERVER_SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          else
            # Сырой ключ: убираем \r (Windows) — иначе "Load key: error in libcrypto"
            echo "$SERVER_SSH_KEY" | sed 's/\r$//' > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          if ! grep -q -- "BEGIN" ~/.ssh/deploy_key || ! grep -q -- "PRIVATE KEY" ~/.ssh/deploy_key; then
            echo "::error::SERVER_SSH_KEY не похож на приватный ключ. Вставь в Secrets полное содержимое deploy_key (cat deploy_key)."
            exit 1
          fi
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=15 -o ServerAliveCountMax=40 -o TCPKeepAlive=yes"
          echo "Checking SSH connectivity..."
          ssh -o BatchMode=yes $SSH_OPTS "$SERVER_USER@$SERVER_HOST" "echo ok"
          echo "Preparing directories on server..."
          # Временные файлы rsync на приёмнике — в /tmp (иначе mkstemp в /var/www/... даёт Permission denied, если каталог не принадлежит SERVER_USER)
          # ВАЖНО: сначала останавливаем процесс и очищаем .next, чтобы не было смеси старых/новых чанков.
          ssh $SSH_OPTS "$SERVER_USER@$SERVER_HOST" \
            "mkdir -p /var/www/spindate /tmp/rsync-spindate && \
             chmod 1777 /tmp/rsync-spindate && \
             pm2 stop spindate 2>/dev/null || true && \
             rm -rf /var/www/spindate/.next"
          echo "Syncing files..."
          # Без -a и без -t: не трогаем mtime (иначе Operation not permitted на приёмнике).
          # Без -o/-g: не пытаемся сохранить uid/gid с раннера GitHub на вашем сервере.
          # -M: на удалённый rsync — временные файлы в /tmp (обход Permission denied на mkstemp в /var/www)
          rsync -rlpvz --delete \
            -M '--temp-dir=/tmp/rsync-spindate' \
            --exclude 'node_modules' \
            --exclude 'data' \
            --exclude '.env*' \
            --exclude '.git' \
            --exclude 'cache' \
            --exclude '.DS_Store' \
            -e "ssh $SSH_OPTS" \
            .next \
            public \
            package.json \
            package-lock.json \
            next.config.mjs \
            ecosystem.config.cjs \
            "$SERVER_USER@$SERVER_HOST:/var/www/spindate/"
          echo "Running npm ci and pm2 on server..."
          # Иначе npm ci падает с ENOTEMPTY на node_modules/next/... — процесс держит файлы
          ssh $SSH_OPTS "$SERVER_USER@$SERVER_HOST" \
            "cd /var/www/spindate && \
             sleep 2 && \
             rm -rf node_modules && \
             npm ci && \
             pm2 delete spindate 2>/dev/null || true && \
             PORT=3002 pm2 start ecosystem.config.cjs --update-env && \
             pm2 save"
          echo "Deploy finished."
