# Sample workflow for building and deploying a Next.js site to GitHub Pages
#
# To get started with Next.js see: https://nextjs.org/docs/getting-started
#
name: Deploy Next.js site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  # Поддержка Node.js 24 в GitHub Actions (предупреждение о deprecation Node 20)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      BUILD_FOR_PAGES: "true"
      # Путь приложения на GitHub Pages (https://user.github.io/REPO_NAME/) — без этого картинки из public/ не грузятся
      NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/pnpm-lock.yaml" ]; then
            echo "manager=pnpm" >> $GITHUB_OUTPUT
            echo "command=install --frozen-lockfile" >> $GITHUB_OUTPUT
            echo "runner=pnpm exec" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Unable to determine package manager"
          exit 1
      - name: Setup pnpm
        if: steps.detect-package-manager.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: ${{ steps.detect-package-manager.outputs.manager }}
      # basePath и output: export задаём через env в next.config.mjs. Шаг configure-pages убран — парсит конфиг и падает (TypeError).
      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}
      # GitHub Pages — только статический экспорт; API routes не поддерживаются. Выносим app/api за пределы app/, чтобы Next.js не видел маршруты
      - name: Hide API routes for static export
        run: |
          if [ -d app/api ]; then mv app/api .api-backup; fi
          ls -la app/
      - name: Clear Next.js cache before static build
        run: rm -rf .next
      - name: Build with Next.js (static export for Pages)
        run: ${{ steps.detect-package-manager.outputs.runner }} next build
      - name: Restore API routes
        if: always()
        run: if [ -d .api-backup ]; then mv .api-backup app/api; fi
      # Next.js export с basePath может класть файлы в корень out/ (без подпапки). Копируем ассеты туда, куда смотрит приложение: out/assets/ или out/REPO/assets/
      - name: Ensure public assets in out (under basePath)
        run: |
          set -e
          REPO="${{ github.event.repository.name }}"
          test -d out || (echo "out/ not found after build" && exit 1)
          test -d "public/assets" || (echo "public/assets/ not found" && exit 1)
          if [ -d "out/${REPO}" ]; then
            ASSET_DIR="out/${REPO}/assets"
          else
            ASSET_DIR="out/assets"
          fi
          echo "Assets target: ${ASSET_DIR}"
          mkdir -p "$ASSET_DIR"
          cp -r public/assets/. "$ASSET_DIR/"
          echo "Contents of ${ASSET_DIR}:"
          ls -la "$ASSET_DIR/"
          for f in 7786876.svg ram-rabbit.svg ram-fea.svg ram-lis.svg ram-mag.svg ram-malif.svg ram-mir.svg ram-vesna.svg b_standart_v2.webp; do
            test -f "${ASSET_DIR}/${f}" || (echo "Missing: ${f}" && exit 1)
          done
          FIRST=$(head -c 1 "${ASSET_DIR}/ram-fea.svg")
          test "$FIRST" = "<" || (echo "ram-fea.svg does not start with < (got: $FIRST)" && exit 1)
          echo "All required assets present and valid."
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
